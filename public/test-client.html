<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snapify | Integrated Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #000; color: white; overflow: hidden; }
        .snap-yellow { background-color: #FFFC00; color: black; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #FFFC00 !important; }
        .msg-me { background: #00baff; border-radius: 18px 18px 0 18px; }
        .msg-other { background: #333; border-radius: 18px 18px 18px 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE = "http://localhost:5001/api/v1";
        const SOCKET_URL = "http://localhost:5001";

        function App() {
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('user');
                try { return (saved && saved !== "undefined") ? JSON.parse(saved) : null; }
                catch { return null; }
            });
            const [token, setToken] = useState(localStorage.getItem('token') || null);
            const [tab, setTab] = useState('camera'); 
            const socketRef = useRef(null); // Ref name changed to socketRef for clarity

            useEffect(() => {
                if (token && user?.id) {
                    socketRef.current = io(SOCKET_URL);
                    socketRef.current.emit('setup', user.id);
                    
                    socketRef.current.on('notification_received', (data) => {
                        console.log("Real-time Notification:", data);
                    });
                }
                return () => socketRef.current?.disconnect();
            }, [token, user]);

            useEffect(() => { lucide.createIcons(); }, [tab, token, user]);

            if (!token || !user) {
                return <Auth setToken={setToken} setUser={setUser} />;
            }

            return (
                <div className="h-screen w-full max-w-md mx-auto relative flex flex-col bg-black overflow-hidden border-x border-zinc-800">
                    <header className="absolute top-0 w-full p-4 flex justify-between items-center z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-zinc-800 border-2 border-yellow-400 flex items-center justify-center font-bold cursor-pointer" onClick={() => setTab('profile')}>
                                {user?.username?.[0].toUpperCase() || '?'}
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <div className="bg-zinc-800/60 p-2 rounded-full"><i data-lucide="search" className="w-5 h-5"></i></div>
                            <div className="bg-zinc-800/60 p-2 rounded-full" onClick={() => setTab('profile')}><i data-lucide="settings" className="w-5 h-5"></i></div>
                        </div>
                    </header>

                    <div className="flex-1 overflow-y-auto hide-scrollbar pb-24 pt-16">
                        {tab === 'camera' && <CameraView user={user} token={token} />}
                        {tab === 'chat' && <ChatList user={user} token={token} socketInstance={socketRef.current} />}
                        {tab === 'stories' && <Stories token={token} />}
                        {tab === 'profile' && <Profile user={user} setUser={setUser} setToken={setToken} />}
                    </div>

                    <nav className="fixed bottom-0 w-full max-w-md h-20 bg-black/90 backdrop-blur-xl flex justify-around items-center px-4 border-t border-zinc-900 z-50">
                        <button onClick={() => setTab('map')} className={tab === 'map' ? 'active-tab' : 'text-zinc-500'}><i data-lucide="map-pin"></i></button>
                        <button onClick={() => setTab('chat')} className={tab === 'chat' ? 'active-tab' : 'text-zinc-500'}><i data-lucide="message-square"></i></button>
                        <button onClick={() => setTab('camera')} className="relative">
                            <div className={`w-14 h-14 rounded-full border-4 ${tab === 'camera' ? 'border-yellow-400' : 'border-white'} flex items-center justify-center`}>
                                <div className="w-10 h-10 rounded-full bg-white"></div>
                            </div>
                        </button>
                        <button onClick={() => setTab('stories')} className={tab === 'stories' ? 'active-tab' : 'text-zinc-500'}><i data-lucide="users"></i></button>
                        <button onClick={() => setTab('spotlight')} className={tab === 'spotlight' ? 'active-tab' : 'text-zinc-500'}><i data-lucide="play"></i></button>
                    </nav>
                </div>
            );
        }

        function Auth({ setToken, setUser }) {
            const [isLogin, setIsLogin] = useState(true);
            const [form, setForm] = useState({ username: '', email: '', password: '' });

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    const endpoint = isLogin ? "/auth/login" : "/auth/register";
                    const payload = isLogin 
                        ? { identifier: form.email || form.username, password: form.password } 
                        : { username: form.username, email: form.email, password: form.password };
                    
                    const res = await axios.post(API_BASE + endpoint, payload);
                    if (res.data.success) {
                        const userData = res.data.user;
                        const userToken = res.data.token;
                        localStorage.setItem('token', userToken);
                        localStorage.setItem('user', JSON.stringify(userData));
                        setToken(userToken);
                        setUser(userData);
                    }
                } catch (err) { alert(err.response?.data?.message || "Error connecting to server"); }
            };

            return (
                <div className="h-screen flex flex-col items-center justify-center p-8 bg-black w-full">
                    <div className="snap-yellow p-4 rounded-3xl mb-6 shadow-lg"><i data-lucide="ghost" className="w-12 h-12"></i></div>
                    <h1 className="text-4xl font-black mb-10 text-yellow-400 tracking-tighter">SNAPIFY</h1>
                    <form onSubmit={handleSubmit} className="w-full max-w-sm space-y-4">
                        {!isLogin && <input className="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800 outline-none focus:border-yellow-400" placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} required />}
                        <input className="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800 outline-none focus:border-yellow-400" placeholder="Email or Username" onChange={e => setForm({...form, email: e.target.value})} required />
                        <input type="password" auto-complete="current-password" className="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800 outline-none focus:border-yellow-400" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} required />
                        <button type="submit" className="w-full p-4 rounded-2xl snap-yellow font-bold text-lg active:scale-95 transition">{isLogin ? "Log In" : "Sign Up"}</button>
                    </form>
                    <p className="mt-8 text-zinc-500 cursor-pointer" onClick={() => setIsLogin(!isLogin)}>
                        {isLogin ? "New here? Create Account" : "Already have account? Login"}
                    </p>
                </div>
            );
        }

        function ChatList({ token, user, socketInstance }) {
            const [chats, setChats] = useState([]);
            const [openChat, setOpenChat] = useState(null);

            useEffect(() => {
                axios.get(API_BASE + "/chats", { headers: { Authorization: `Bearer ${token}` }})
                    .then(res => setChats(res.data.data))
                    .catch(() => setChats([]));
            }, [token]);

            if (openChat) return <ChatWindow chat={openChat} token={token} user={user} socketInstance={socketInstance} back={() => setOpenChat(null)} />;

            return (
                <div className="bg-white text-black h-full rounded-t-[2.5rem] p-5 shadow-inner">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-black">Chat</h2>
                        <i data-lucide="message-square-plus" className="text-zinc-400"></i>
                    </div>
                    {chats.map(chat => {
                        const friend = chat.participants?.find(p => p.id !== user.id) || { username: 'Friend' };
                        return (
                            <div key={chat.id} onClick={() => setOpenChat(chat)} className="flex items-center gap-4 py-4 border-b border-zinc-50 active:bg-zinc-50 cursor-pointer">
                                <div className="w-14 h-14 rounded-2xl bg-zinc-100 flex items-center justify-center font-bold text-zinc-400 uppercase text-xl">
                                    {friend.username[0]}
                                </div>
                                <div className="flex-1">
                                    <h4 className="font-bold text-lg">{friend.username}</h4>
                                    <p className="text-sm text-blue-500 font-medium">New Snap • Now</p>
                                </div>
                                <div className="text-orange-500 font-bold italic">{chat.streak || 0} 🔥</div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function ChatWindow({ chat, token, user, socketInstance, back }) {
            const [msgs, setMsgs] = useState([]);
            const [input, setInput] = useState("");
            const scrollRef = useRef();
            const friend = chat.participants?.find(p => p.id !== user.id) || { username: 'Friend', id: '' };

            useEffect(() => {
                axios.get(`${API_BASE}/messages/${chat.id}`, { headers: { Authorization: `Bearer ${token}` }})
                    .then(res => setMsgs(res.data.data));
                
                if (socketInstance) {
                    socketInstance.emit('join_chat', chat.id);
                    socketInstance.on('message_received', (data) => {
                        if(data.conversationId === chat.id) setMsgs(prev => [...prev, data]);
                    });
                }
            }, [chat.id, socketInstance, token]);

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

            const send = () => {
                if (!input || !socketInstance) return;
                const payload = { 
                    conversationId: chat.id, 
                    senderId: user.id, 
                    content: input, 
                    receiverId: friend.id,
                    messageId: "msg-" + Date.now()
                };
                socketInstance.emit('new_message', payload);
                setMsgs(prev => [...prev, { ...payload, sender: { username: user.username } }]);
                setInput("");
            };

            return (
                <div className="fixed inset-0 bg-white text-black z-[100] flex flex-col max-w-md mx-auto">
                    <div className="p-4 border-b flex items-center gap-4">
                        <button onClick={back} className="p-2 hover:bg-zinc-100 rounded-full text-zinc-600"><i data-lucide="chevron-left"></i></button>
                        <div className="w-10 h-10 rounded-full bg-zinc-800 text-white flex items-center justify-center font-bold uppercase">{friend.username[0]}</div>
                        <h3 className="font-bold text-lg">{friend.username}</h3>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-zinc-50">
                        {msgs.map((m, i) => (
                            <div key={i} className={`flex ${m.senderId === user.id ? 'justify-end' : 'justify-start'}`}>
                                <div className={`p-3 max-w-[80%] shadow-sm ${m.senderId === user.id ? 'msg-me text-white' : 'msg-other text-white'}`}>
                                    {m.content}
                                </div>
                            </div>
                        ))}
                        <div ref={scrollRef}></div>
                    </div>
                    <div className="p-4 flex gap-2 border-t bg-white items-center">
                        <input className="flex-1 p-4 rounded-full bg-zinc-100 outline-none text-sm" placeholder="Send a chat" value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && send()} />
                        <button onClick={send} className="bg-blue-500 text-white p-4 rounded-full shadow-lg"><i data-lucide="send" className="w-5 h-5"></i></button>
                    </div>
                </div>
            );
        }

        function CameraView({ token, user }) {
            const sendSnap = async () => {
                const friendId = prompt("Enter Friend User ID:");
                if(!friendId) return;
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.onchange = async () => {
                    const formData = new FormData();
                    formData.append('file', fileInput.files[0]);
                    formData.append('receiverId', friendId);
                    formData.append('mediaType', 'IMAGE');
                    try {
                        await axios.post(API_BASE + "/snaps/send", formData, { headers: { Authorization: `Bearer ${token}` }});
                        alert("Snap Sent! 🔥");
                    } catch { alert("Failed to send"); }
                };
                fileInput.click();
            };

            return (
                <div className="h-full flex flex-col items-center justify-center bg-zinc-900 rounded-t-[3rem]">
                    <div className="text-zinc-500 font-bold tracking-widest uppercase text-xs mb-20">Snap Camera</div>
                    <button onClick={sendSnap} className="w-24 h-24 rounded-full border-8 border-white flex items-center justify-center active:scale-90 transition shadow-2xl">
                        <div className="w-16 h-16 rounded-full bg-white shadow-inner"></div>
                    </button>
                    <div className="absolute right-6 top-1/2 -translate-y-1/2 flex flex-col gap-8 bg-black/30 p-4 rounded-full glass">
                        <i data-lucide="rotate-ccw"></i>
                        <i data-lucide="zap" className="text-yellow-400"></i>
                        <i data-lucide="moon"></i>
                        <i data-lucide="music"></i>
                    </div>
                </div>
            );
        }

        function Stories({ token }) {
            const [feed, setFeed] = useState([]);
            useEffect(() => {
                axios.get(API_BASE + "/stories/feed", { headers: { Authorization: `Bearer ${token}` }})
                    .then(res => setFeed(res.data.data)).catch(() => setFeed([]));
            }, [token]);

            return (
                <div className="p-5">
                    <h2 className="text-3xl font-black mb-6">Stories</h2>
                    <div className="grid grid-cols-2 gap-4">
                        {feed.map(story => (
                            <div key={story.id} className="h-72 rounded-[2rem] bg-zinc-800 overflow-hidden relative border border-zinc-700 shadow-xl">
                                <img src={story.url} className="w-full h-full object-cover opacity-80" />
                                <div className="absolute bottom-4 left-4 flex items-center gap-2">
                                    <div className="w-6 h-6 rounded-full bg-yellow-400 border border-black"></div>
                                    <span className="text-xs font-bold">{story.author?.username}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                    {feed.length === 0 && <p className="text-center text-zinc-600 mt-20 italic">No active stories</p>}
                </div>
            );
        }

        function Profile({ user, setUser, setToken }) {
            const logout = () => { localStorage.clear(); setToken(null); setUser(null); };
            return (
                <div className="p-8 text-center animate-pop">
                    <div className="w-36 h-36 rounded-[2.5rem] bg-zinc-800 border-4 border-yellow-400 mx-auto flex items-center justify-center text-5xl font-black mb-6 text-yellow-400 shadow-2xl">
                        {user?.username?.[0].toUpperCase()}
                    </div>
                    <h1 className="text-4xl font-black mb-1">{user?.username}</h1>
                    <p className="text-zinc-500 mb-10 font-medium">{user?.email}</p>
                    
                    <div className="flex justify-center gap-8 mb-10 bg-zinc-900 p-6 rounded-[2rem] border border-zinc-800 shadow-xl">
                        <div><p className="text-2xl font-black text-yellow-400">{user?.score || 0}</p><p className="text-[10px] uppercase font-bold text-zinc-500">Score</p></div>
                        <div className="w-[1px] bg-zinc-800"></div>
                        <div><p className="text-2xl font-black text-orange-500">{user?.streak || 0} 🔥</p><p className="text-[10px] uppercase font-bold text-zinc-500">Streak</p></div>
                    </div>

                    <button onClick={logout} className="w-full p-5 bg-red-500/10 text-red-500 rounded-[1.5rem] font-black uppercase text-xs hover:bg-red-500 hover:text-white transition">Log Out</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
